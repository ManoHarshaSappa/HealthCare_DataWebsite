<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lucas Andre Silva | HealthDataX</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <main class="page detail-page">
      <a class="back-link" href="../index.html">Back to Patients</a>

      <section class="detail-header">
        <div>
          <p class="eyebrow">Patient HL7 Record</p>
          <h1>Lucas Andre Silva</h1>
          <p class="subtitle">Username: lucas.silva18 | Password: Lucas@18 | Visits: 2</p>
        </div>
      </section>

      <section class="hl7-panel">
        <div class="hl7-top">
          <strong>Raw HL7 Message History</strong>
          <span>P100018</span>
        </div>
        <pre id="hl7-output" class="hl7-output" data-source="../raw_hl7/P100018.hl7">Loading HL7...</pre>
      </section>
    </main>

    <script>
      const output = document.getElementById("hl7-output");
      fetch(output.dataset.source)
        .then((response) => response.text())
        .then((text) => {
          output.textContent = text;
        })
        .catch((error) => {
          output.textContent = "Unable to load HL7: " + error.message;
        });
    </script>
  </body>
</html>
