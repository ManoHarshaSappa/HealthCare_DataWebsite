<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting to HealthDataX Portal</title>
    <meta http-equiv="refresh" content="0; url=./portal/" />
    <link rel="canonical" href="./portal/" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, Roboto, "Segoe UI", sans-serif;
        background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
        color: #0f172a;
      }

      .card {
        width: min(680px, calc(100% - 48px));
        padding: 28px 32px;
        border: 1px solid #e2e8f0;
        border-radius: 20px;
        background: #ffffff;
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
      }

      a {
        color: #2563eb;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Redirecting to the HealthDataX portal...</h1>
      <p>If the page does not open automatically, <a href="./portal/">open the portal here</a>.</p>
    </div>
  </body>
</html>
